repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.1.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

      - id: mixed-line-ending
        args: [--fix=crlf]

  - repo: local
    hooks:
      - id: formatjson
        name: Format JSON manifests
        entry: pwsh -ExecutionPolicy Bypass -File bin/formatjson.ps1
        language: system
        files: ^bucket/.*\.json$
        pass_filenames: false

